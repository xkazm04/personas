# Lefthook git hooks for personas-desktop
#
# Hooks installed by `npm install` via the `prepare` script (lefthook install).
# Disable for a single command with LEFTHOOK=0; uninstall with `lefthook uninstall`.
#
# Design principles:
# - pre-commit must stay fast (<5s on a small commit) so it doesn't break flow
# - hooks NEVER stash, restore, or rewrite the working tree (concurrent CLIs
#   share the tree; mutating it would clobber other sessions' work)
# - lint --fix is applied to staged files only; the developer re-stages if
#   they want the auto-fixes included
# - heavier validation (full type-check, i18n coverage) lives on pre-push so
#   the local build feedback loop catches things before they reach CI

pre-commit:
  parallel: true
  jobs:
    - name: eslint-staged
      glob: "*.{ts,tsx,js,cjs,mjs}"
      run: npx eslint --quiet --no-warn-ignored --max-warnings 99999 {staged_files}

pre-push:
  jobs:
    - name: typecheck
      run: npx tsc --noEmit

    - name: i18n-coverage
      run: node scripts/i18n/check-coverage.mjs
