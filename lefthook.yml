# Lefthook git hooks for personas-desktop
#
# Hooks installed by `npm install` via the `prepare` script (lefthook install).
# Disable for a single command with LEFTHOOK=0; uninstall with `lefthook uninstall`.
#
# Design principles:
# - pre-commit must stay fast (<5s on a small commit) so it doesn't break flow
# - hooks NEVER stash, restore, or rewrite the working tree (concurrent CLIs
#   share the tree; mutating it would clobber other sessions' work)
# - lint --fix is applied to staged files only; the developer re-stages if
#   they want the auto-fixes included
# - heavier validation (full type-check, i18n coverage) lives on pre-push so
#   the local build feedback loop catches things before they reach CI

pre-commit:
  parallel: true
  jobs:
    - name: eslint-staged
      glob: "*.{ts,tsx,js,cjs,mjs}"
      run: npx eslint --quiet --no-warn-ignored --max-warnings 99999 {staged_files}

    # Secret scan on staged changes — the shift-left D9 control: a leaked key is blocked BEFORE it
    # leaves the machine (CI catching it is already a leak). Runs gitleaks if installed, else skips
    # with an install hint (the wrapper never breaks a commit). Read-only; never mutates the tree.
    # Install gitleaks to enable: https://github.com/gitleaks/gitleaks
    - name: gitleaks-staged
      run: node scripts/secret-scan.mjs

    # Block commits that would ship a translation gap (English mixed into a
    # non-English UI — which the user has ruled unacceptable). Scoped to locale
    # edits so unrelated commits are unaffected; --strict fails on MISSING keys
    # (not just the default extras), so adding en.json keys without translating
    # every locale is blocked here rather than silently shipping English
    # fallback. Fix via the pipeline: scripts/i18n/translate-extract.mjs →
    # one Sonnet subagent per locale → scripts/i18n/translate-merge.mjs.
    # See .claude/CLAUDE.md → "Translation completeness — no gaps".
    - name: i18n-no-gaps
      glob: "src/i18n/locales/*.json"
      run: node scripts/i18n/check-coverage.mjs --strict

    # Key parity (above) is only half the contract: it asserts a key EXISTS in
    # every locale, never that its VALUE was translated. The runtime `t` Proxy
    # deep-merges English under every locale, so an untranslated value renders
    # as English with no warning. That blind spot hid ~57k raw-English strings
    # (~24% of the app) behind a green "0 missing" report until 2026-07-12.
    # This gate fails when a translatable, LIVE (source-referenced) value is
    # still byte-identical to English. Dead keys and docs/i18n allowlist entries
    # are excluded. Close a gap with the i18n-translate skill (`gaps all`).
    - name: i18n-no-untranslated
      glob: "src/i18n/locales/*.json"
      run: node scripts/i18n/check-untranslated.mjs --strict

pre-push:
  jobs:
    - name: typecheck
      run: npx tsc --noEmit

    - name: i18n-coverage
      run: node scripts/i18n/check-coverage.mjs

    # D8: agent/prompt eval contracts — keep the agent library from drifting into ambiguity.
    - name: evals
      run: npm run test:evals

    # .ai/ standard: conformance gate (same script CI runs) + CONTEXT-freshness nag. Fast, advisory
    # on warnings; the doctor exits non-zero only on a hard FAIL.
    - name: ai-conformance
      run: node .ai/doctor.mjs

    - name: ai-context-freshness
      run: node .ai/maintain.mjs check
