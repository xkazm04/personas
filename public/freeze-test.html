<!DOCTYPE html>
<html><head><title>Freeze Diagnostic</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:20px">
<h2>WebView2 Freeze Diagnostic</h2>
<div id="log" style="white-space:pre-wrap;font-size:12px;max-height:80vh;overflow:auto"></div>
<script>
// This runs WITHOUT React, Vite HMR, or any app code.
// Tests if the WebView itself freezes under load.
const log = document.getElementById('log');
function L(msg) {
  const line = document.createElement('div');
  line.textContent = '[' + Math.round(performance.now()) + 'ms] ' + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

L('Starting freeze diagnostic...');
L('UserAgent: ' + navigator.userAgent);
L('Memory: ' + (performance.memory ? Math.round(performance.memory.usedJSHeapSize/1048576) + 'MB' : 'N/A'));

// Test 1: Is the event loop responsive?
let tickCount = 0;
const ticker = setInterval(() => {
  tickCount++;
  if (tickCount <= 20 || tickCount % 10 === 0) {
    L('Tick ' + tickCount + ' | Heap: ' + (performance.memory ? Math.round(performance.memory.usedJSHeapSize/1048576) + 'MB' : 'N/A'));
  }
  if (tickCount > 100) clearInterval(ticker);
}, 200);

// Test 2: Can we make IPC calls?
setTimeout(() => {
  L('--- Testing IPC ---');
  if (window.__TAURI_INTERNALS__) {
    L('TAURI_INTERNALS found, invoke=' + typeof window.__TAURI_INTERNALS__.invoke);
    try {
      window.__TAURI_INTERNALS__.invoke('get_app_setting', { key: 'test' })
        .then(r => L('IPC OK: ' + JSON.stringify(r)))
        .catch(e => L('IPC Error: ' + e));
    } catch(e) { L('IPC threw: ' + e); }
  } else {
    L('No TAURI_INTERNALS');
  }
}, 2000);

// Test 3: Dynamic import of a heavy module (simulates Vite loading)
setTimeout(() => {
  L('--- Testing heavy import ---');
  const start = performance.now();
  import('/src/stores/systemStore.ts')
    .then(m => L('systemStore loaded in ' + Math.round(performance.now()-start) + 'ms, keys=' + Object.keys(m).length))
    .catch(e => L('systemStore failed: ' + e.message));
}, 3000);

// Test 4: Import overviewStore (triggers cascade)
setTimeout(() => {
  L('--- Testing overviewStore import ---');
  const start = performance.now();
  import('/src/stores/overviewStore.ts')
    .then(m => L('overviewStore loaded in ' + Math.round(performance.now()-start) + 'ms'))
    .catch(e => L('overviewStore failed: ' + e.message));
}, 5000);

// Test 5: Import agentStore
setTimeout(() => {
  L('--- Testing agentStore import ---');
  const start = performance.now();
  import('/src/stores/agentStore.ts')
    .then(m => L('agentStore loaded in ' + Math.round(performance.now()-start) + 'ms'))
    .catch(e => L('agentStore failed: ' + e.message));
}, 7000);

// Test 6: Import the template catalog (heaviest module)
setTimeout(() => {
  L('--- Testing templateCatalog import ---');
  const start = performance.now();
  import('/src/lib/personas/templates/templateCatalog.ts')
    .then(m => {
      L('templateCatalog loaded in ' + Math.round(performance.now()-start) + 'ms');
      L('Templates: ' + (m.TEMPLATE_CATALOG?.length ?? 'unknown'));
      L('Heap after: ' + (performance.memory ? Math.round(performance.memory.usedJSHeapSize/1048576) + 'MB' : 'N/A'));
    })
    .catch(e => L('templateCatalog failed: ' + e.message));
}, 9000);

L('All tests scheduled. Watching for freezes...');
</script>
</body></html>
