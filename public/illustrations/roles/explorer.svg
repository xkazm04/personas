<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Compass outer ring -->
  <circle cx="60" cy="52" r="34" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <circle cx="60" cy="52" r="30" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <!-- Cardinal direction ticks -->
  <line x1="60" y1="19" x2="60" y2="24" stroke="#10B981" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="60" y1="80" x2="60" y2="85" stroke="currentColor" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="27" y1="52" x2="32" y2="52" stroke="currentColor" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="88" y1="52" x2="93" y2="52" stroke="currentColor" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Minor ticks -->
  <line x1="42" y1="27" x2="44" y2="30" stroke="currentColor" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="78" y1="27" x2="76" y2="30" stroke="currentColor" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="42" y1="77" x2="44" y2="74" stroke="currentColor" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="78" y1="77" x2="76" y2="74" stroke="currentColor" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <!-- Compass needle - north (green) -->
  <polygon points="60,26 55,52 65,52" fill="#10B981" opacity="0.6"/>
  <!-- Compass needle - south (muted) -->
  <polygon points="60,78 55,52 65,52" fill="currentColor" opacity="0.15"/>
  <!-- Center pin -->
  <circle cx="60" cy="52" r="3" fill="#10B981" opacity="0.5"/>
  <circle cx="60" cy="52" r="1.5" fill="currentColor" opacity="0.3"/>
  <!-- N label -->
  <text x="56" y="17" font-family="system-ui" font-size="9" font-weight="bold" fill="#10B981" opacity="0.7">N</text>
  <!-- Decorative orbit dots -->
  <circle cx="36" cy="96" r="2" fill="#10B981" opacity="0.2"/>
  <circle cx="48" cy="100" r="1.5" fill="#10B981" opacity="0.15"/>
  <circle cx="60" cy="102" r="2.5" fill="#10B981" opacity="0.25"/>
  <circle cx="72" cy="100" r="1.5" fill="#10B981" opacity="0.15"/>
  <circle cx="84" cy="96" r="2" fill="#10B981" opacity="0.2"/>
  <!-- Connecting path between dots -->
  <path d="M36 96 Q48 104, 60 102 Q72 104, 84 96" stroke="#10B981" stroke-width="1" opacity="0.12" fill="none"/>
  <!-- Ambient glow -->
  <ellipse cx="60" cy="90" rx="30" ry="5" fill="#10B981" opacity="0.05"/>
</svg>
