<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Terminal window -->
  <rect x="10" y="14" width="100" height="76" rx="6" stroke="currentColor" stroke-width="2" opacity="0.6" fill="currentColor" fill-opacity="0.03"/>
  <!-- Title bar -->
  <rect x="10" y="14" width="100" height="14" rx="6" fill="currentColor" fill-opacity="0.08"/>
  <rect x="10" y="22" width="100" height="6" fill="currentColor" fill-opacity="0.08"/>
  <!-- Window buttons -->
  <circle cx="22" cy="21" r="2.5" fill="#EF4444" opacity="0.6"/>
  <circle cx="30" cy="21" r="2.5" fill="#F59E0B" opacity="0.6"/>
  <circle cx="38" cy="21" r="2.5" fill="#22C55E" opacity="0.5"/>
  <!-- Code line 1: function keyword + name -->
  <rect x="20" y="36" width="18" height="2.5" rx="1" fill="#06B6D4" opacity="0.7"/>
  <rect x="41" y="36" width="26" height="2.5" rx="1" fill="currentColor" opacity="0.4"/>
  <text x="69" y="38.5" font-family="monospace" font-size="8" fill="#06B6D4" opacity="0.5">{</text>
  <!-- Code line 2: indented -->
  <rect x="28" y="43" width="14" height="2.5" rx="1" fill="#8B5CF6" opacity="0.5"/>
  <rect x="45" y="43" width="22" height="2.5" rx="1" fill="currentColor" opacity="0.3"/>
  <!-- Code line 3: indented more -->
  <rect x="34" y="50" width="10" height="2.5" rx="1" fill="#06B6D4" opacity="0.6"/>
  <rect x="47" y="50" width="30" height="2.5" rx="1" fill="currentColor" opacity="0.25"/>
  <!-- Code line 4 -->
  <rect x="34" y="57" width="16" height="2.5" rx="1" fill="#F59E0B" opacity="0.5"/>
  <rect x="53" y="57" width="18" height="2.5" rx="1" fill="currentColor" opacity="0.2"/>
  <!-- Code line 5: closing -->
  <rect x="28" y="64" width="8" height="2.5" rx="1" fill="currentColor" opacity="0.3"/>
  <text x="20" y="66.5" font-family="monospace" font-size="8" fill="#06B6D4" opacity="0.5">}</text>
  <!-- Cursor blink -->
  <rect x="20" y="71" width="2" height="8" rx="0.5" fill="#06B6D4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Line numbers -->
  <text x="14" y="38.5" font-family="monospace" font-size="6" fill="currentColor" opacity="0.2">1</text>
  <text x="14" y="45.5" font-family="monospace" font-size="6" fill="currentColor" opacity="0.2">2</text>
  <text x="14" y="52.5" font-family="monospace" font-size="6" fill="currentColor" opacity="0.2">3</text>
  <text x="14" y="59.5" font-family="monospace" font-size="6" fill="currentColor" opacity="0.2">4</text>
  <text x="14" y="66.5" font-family="monospace" font-size="6" fill="currentColor" opacity="0.2">5</text>
  <text x="14" y="73.5" font-family="monospace" font-size="6" fill="currentColor" opacity="0.2">6</text>
  <!-- Angle brackets decoration -->
  <text x="30" y="104" font-family="monospace" font-size="18" fill="#06B6D4" opacity="0.12">&lt;/&gt;</text>
  <!-- Git branch decoration -->
  <path d="M82 96 L82 104 M82 100 C86 100, 90 98, 90 94" stroke="#06B6D4" stroke-width="1.5" opacity="0.2" fill="none" stroke-linecap="round"/>
  <circle cx="82" cy="94" r="2" stroke="#06B6D4" stroke-width="1" opacity="0.2" fill="none"/>
  <circle cx="90" cy="94" r="2" stroke="#06B6D4" stroke-width="1" opacity="0.2" fill="none"/>
  <circle cx="82" cy="106" r="2" stroke="#06B6D4" stroke-width="1" opacity="0.2" fill="none"/>
  <!-- Ambient glow -->
  <ellipse cx="60" cy="90" rx="40" ry="6" fill="#06B6D4" opacity="0.04"/>
</svg>
