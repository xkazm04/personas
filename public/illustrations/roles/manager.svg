<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Board frame -->
  <rect x="8" y="12" width="104" height="80" rx="6" stroke="currentColor" stroke-width="2" opacity="0.5" fill="currentColor" fill-opacity="0.02"/>
  <!-- Column headers -->
  <rect x="12" y="16" width="30" height="8" rx="2" fill="currentColor" fill-opacity="0.08"/>
  <rect x="46" y="16" width="30" height="8" rx="2" fill="#8B5CF6" fill-opacity="0.12"/>
  <rect x="80" y="16" width="28" height="8" rx="2" fill="currentColor" fill-opacity="0.06"/>
  <!-- Header labels -->
  <rect x="16" y="19" width="16" height="2" rx="1" fill="currentColor" opacity="0.3"/>
  <rect x="52" y="19" width="20" height="2" rx="1" fill="#8B5CF6" opacity="0.5"/>
  <rect x="86" y="19" width="14" height="2" rx="1" fill="currentColor" opacity="0.25"/>
  <!-- Column dividers -->
  <line x1="44" y1="16" x2="44" y2="88" stroke="currentColor" stroke-width="1" opacity="0.1"/>
  <line x1="78" y1="16" x2="78" y2="88" stroke="currentColor" stroke-width="1" opacity="0.1"/>
  <!-- Todo column cards -->
  <rect x="14" y="30" width="26" height="14" rx="3" stroke="currentColor" stroke-width="1.2" opacity="0.3" fill="currentColor" fill-opacity="0.03"/>
  <rect x="16" y="34" width="14" height="2" rx="1" fill="currentColor" opacity="0.25"/>
  <rect x="16" y="38" width="10" height="1.5" rx="0.75" fill="currentColor" opacity="0.12"/>
  <rect x="14" y="48" width="26" height="14" rx="3" stroke="currentColor" stroke-width="1.2" opacity="0.25" fill="currentColor" fill-opacity="0.02"/>
  <rect x="16" y="52" width="18" height="2" rx="1" fill="currentColor" opacity="0.2"/>
  <rect x="16" y="56" width="12" height="1.5" rx="0.75" fill="currentColor" opacity="0.1"/>
  <!-- In Progress column cards (highlighted) -->
  <rect x="48" y="30" width="26" height="14" rx="3" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5" fill="#8B5CF6" fill-opacity="0.08"/>
  <rect x="50" y="34" width="16" height="2" rx="1" fill="#8B5CF6" opacity="0.6"/>
  <rect x="50" y="38" width="10" height="1.5" rx="0.75" fill="#8B5CF6" opacity="0.3"/>
  <!-- Progress bar on active card -->
  <rect x="50" y="40.5" width="20" height="1.5" rx="0.75" fill="currentColor" fill-opacity="0.1"/>
  <rect x="50" y="40.5" width="13" height="1.5" rx="0.75" fill="#8B5CF6" opacity="0.5"/>
  <rect x="48" y="48" width="26" height="14" rx="3" stroke="#8B5CF6" stroke-width="1.2" opacity="0.3" fill="#8B5CF6" fill-opacity="0.04"/>
  <rect x="50" y="52" width="20" height="2" rx="1" fill="#8B5CF6" opacity="0.4"/>
  <rect x="50" y="56" width="14" height="1.5" rx="0.75" fill="#8B5CF6" opacity="0.2"/>
  <!-- Done column cards -->
  <rect x="82" y="30" width="24" height="14" rx="3" stroke="currentColor" stroke-width="1.2" opacity="0.2" fill="currentColor" fill-opacity="0.02"/>
  <rect x="84" y="34" width="12" height="2" rx="1" fill="currentColor" opacity="0.15"/>
  <!-- Checkmark on done card -->
  <path d="M96 36 L99 39 L104 33" stroke="#22C55E" stroke-width="1.5" opacity="0.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Timeline / Gantt bars at bottom -->
  <rect x="12" y="70" width="96" height="1" rx="0.5" fill="currentColor" opacity="0.08"/>
  <rect x="18" y="74" width="24" height="4" rx="2" fill="#8B5CF6" opacity="0.25"/>
  <rect x="46" y="74" width="18" height="4" rx="2" fill="#8B5CF6" opacity="0.4"/>
  <rect x="68" y="74" width="30" height="4" rx="2" fill="#8B5CF6" opacity="0.15"/>
  <rect x="18" y="81" width="14" height="4" rx="2" fill="currentColor" opacity="0.1"/>
  <rect x="36" y="81" width="28" height="4" rx="2" fill="#8B5CF6" opacity="0.2"/>
  <rect x="68" y="81" width="20" height="4" rx="2" fill="currentColor" opacity="0.08"/>
  <!-- Connection dots on timeline -->
  <circle cx="42" cy="76" r="2" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="64" cy="76" r="2" fill="#8B5CF6" opacity="0.35"/>
  <!-- Stats decoration at bottom -->
  <rect x="20" y="100" width="8" height="12" rx="1.5" fill="#8B5CF6" opacity="0.1"/>
  <rect x="32" y="104" width="8" height="8" rx="1.5" fill="#8B5CF6" opacity="0.15"/>
  <rect x="44" y="97" width="8" height="15" rx="1.5" fill="#8B5CF6" opacity="0.2"/>
  <rect x="56" y="102" width="8" height="10" rx="1.5" fill="#8B5CF6" opacity="0.12"/>
  <!-- Ambient glow -->
  <ellipse cx="60" cy="92" rx="40" ry="5" fill="#8B5CF6" opacity="0.04"/>
</svg>
