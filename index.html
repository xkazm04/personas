<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icons/icon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personas</title>
    <script src="/webview2-compat.js"></script>
    <script src="/theme-init.js"></script>
    <script>
      // Global error handler to catch uncaught errors (helps debug Android WebView)
      window.onerror = function(msg, url, line, col, err) {
        console.error('[GLOBAL ERROR] ' + msg + ' at ' + url + ':' + line + ':' + col);
        if (err && err.stack) console.error('[GLOBAL ERROR] Stack: ' + err.stack);
      };
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason;
        var msg = r instanceof Error ? r.message : (r && typeof r === 'object' ? (r.message || r.error || JSON.stringify(r)) : String(r));
        console.error('[UNHANDLED PROMISE] ' + msg);
      });
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
