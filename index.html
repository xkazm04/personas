<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./icons/icon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Personas</title>
    <script>window.__BOOT_TIME__ = performance.now();</script>
    <script src="./webview2-compat.js"></script>
    <script src="./theme-init.js"></script>
    <script>
      // Global error handler — persists errors to Rust log file via IPC
      function __logToRust(level, message) {
        try {
          if (window.__TAURI_INTERNALS__) {
            window.__TAURI_INTERNALS__.invoke('log_frontend_error', { level: level, message: message });
          }
        } catch (_) { /* IPC not ready yet */ }
      }
      window.onerror = function(msg, url, line, col, err) {
        var text = '[GLOBAL ERROR] ' + msg + ' at ' + url + ':' + line + ':' + col;
        if (err && err.stack) text += '\n' + err.stack;
        console.error(text);
        __logToRust('error', text);
      };
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason;
        var msg = r instanceof Error ? r.message : (r && typeof r === 'object' ? (r.message || r.error || JSON.stringify(r)) : String(r));
        // Vite HMR client races its own WebSocket during dev — never a real bug
        if (typeof msg === 'string' && msg.indexOf('send was called before connect') !== -1) return;
        var text = '[UNHANDLED PROMISE] ' + msg;
        console.error(text);
        __logToRust('error', text);
      });
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
