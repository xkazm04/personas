[package]
name = "personas-desktop"
version = "0.1.6"
description = "Personas AI Agent Platform"
authors = ["Personas"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"
default-run = "personas-desktop"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[features]
default = []
desktop = [
    "tauri/tray-icon",
    "dep:arboard",
    "dep:notify",
    "dep:keyring",
    "dep:which",
    "dep:tauri-plugin-window-state",
    "dep:tauri-plugin-updater",
    "dep:tauri-plugin-single-instance",
]
# mobile feature is activated automatically by Tauri v2 when targeting Android/iOS
mobile = []

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-notification = "2"
