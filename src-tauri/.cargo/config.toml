# ts-rs binding output path. Default would be `src-tauri/bindings/`; redirect
# to `src/lib/bindings/` (the frontend's canonical import path) so there's
# one source of truth instead of two committed copies that drift.
#
# `relative = true` resolves against the parent directory of this config file
# (= `src-tauri/`), so `../src/lib/bindings` → repo-root `src/lib/bindings`.
# `force = true` is REQUIRED — without it, proc-macro subprocesses (where the
# ts-rs derive runs) silently inherit an empty env and fall back to the default
# `src-tauri/bindings/` location, producing the dual-tree drift documented
# in earlier parallel-session notes. With force=true the macro sees the path
# at every expansion. Verified 2026-05-22: same touch+test cycle wrote bindings
# to `src/lib/bindings/` with force, to `src-tauri/bindings/` without it.
[env]
TS_RS_EXPORT_DIR = { value = "../src/lib/bindings", relative = true, force = true }

# Use LLD for faster linking on Windows (2-5x faster than MSVC link.exe).
# Applied to both Windows targets — speeds up cross-arch dev builds equally.
[target.aarch64-pc-windows-msvc]
linker = "lld-link"
# Windows main-thread stack size bump. The default 1 MB main-thread stack
# can be exhausted by sync `pub fn` Tauri commands (which run on the
# webview/main thread) when they serialize deeply-nested payloads —
# observed as STATUS_STACK_OVERFLOW in debug builds after creating many
# personas with rich design_context + triggers + subscriptions. 8 MB
# matches Linux/macOS defaults and leaves plenty of headroom.
rustflags = ["-C", "link-arg=/STACK:8388608"]

[target.x86_64-pc-windows-msvc]
# linker = "lld-link"  # disabled 2026-05-03 — lld-link not on PATH on this
# machine. Restore after `winget install LLVM.LLVM` (or scoop/choco) for the
# 2-5x faster dev links. Falling back to MSVC's default link.exe meanwhile.
rustflags = ["-C", "link-arg=/STACK:8388608"]

# Android linker config has been moved out of the project to keep `.cargo/config.toml`
# portable. The Android NDK paths are user-specific (NDK version, install dir, host
# OS) and committing absolute paths breaks every other dev machine + CI.
#
# To build Android targets locally, see docs/ANDROID-BUILD.md — the recommended
# path is `cargo-ndk`, but per-user overrides in `~/.cargo/config.toml` (which
# Cargo merges with this file) also work.
