# ts-rs binding output path. Default would be `src-tauri/bindings/`; redirect
# to `src/lib/bindings/` (the frontend's canonical import path) so there's
# one source of truth instead of two committed copies that drift. The path
# is relative to CARGO_MANIFEST_DIR (= src-tauri/), so `../src/lib/bindings/`
# resolves to repo-root-relative `src/lib/bindings/`. Future ts-rs invocations
# (predev, prebuild, CI) write here directly — no manual copy step.
[env]
TS_RS_EXPORT_DIR = { value = "../src/lib/bindings", relative = true }

# Use LLD for faster linking on Windows (2-5x faster than MSVC link.exe)
[target.aarch64-pc-windows-msvc]
linker = "lld-link"
# Windows main-thread stack size bump. The default 1 MB main-thread stack
# can be exhausted by sync `pub fn` Tauri commands (which run on the
# webview/main thread) when they serialize deeply-nested payloads —
# observed as STATUS_STACK_OVERFLOW in debug builds after creating many
# personas with rich design_context + triggers + subscriptions. 8 MB
# matches Linux/macOS defaults and leaves plenty of headroom.
rustflags = ["-C", "link-arg=/STACK:8388608"]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:8388608"]

