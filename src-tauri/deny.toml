# cargo-deny configuration — supply-chain policy enforcement
# Run: cd src-tauri && cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
]

# --------------------------------------------------------------------------
# Advisory database — block known vulnerabilities
# --------------------------------------------------------------------------
[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
ignore = []

# --------------------------------------------------------------------------
# License policy — allowlist of acceptable OSS licenses
# --------------------------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# --------------------------------------------------------------------------
# Bans — prevent problematic crates or excessive duplication
# --------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []

# --------------------------------------------------------------------------
# Sources — only allow crates.io, block unknown registries/git
# --------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
