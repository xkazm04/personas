<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Athena Browser Bridge — pairing</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 460px; margin: 2rem auto; color: #1f2430; }
    label { display: block; margin-top: 1rem; font-weight: 600; font-size: .9rem; }
    input[type=text], input[type=number] { width: 100%; padding: .45rem .6rem; margin-top: .25rem; box-sizing: border-box; }
    .row { display: flex; align-items: center; gap: .5rem; margin-top: 1rem; }
    button { margin-top: 1.25rem; padding: .5rem 1.1rem; }
    #status { margin-top: 1rem; font-size: .9rem; }
    .ok { color: #16a34a; } .bad { color: #dc2626; }
    .hint { color: #6b7280; font-size: .8rem; margin-top: .25rem; }
  </style>
</head>
<body>
  <h2>Athena Browser Bridge</h2>
  <p class="hint">Pairs this browser with the Personas desktop app so Athena can run
  approved live tests here. The extension only ever drives tabs it opens itself.</p>

  <label for="port">Personas bridge port</label>
  <input id="port" type="number" placeholder="17400">
  <p class="hint">The app's local server port (default 17400; check the app log line
  "local_http listening" if it moved).</p>

  <label for="token">Pairing token</label>
  <input id="token" type="text" placeholder="paste the pairing token">

  <div class="row">
    <input id="enabled" type="checkbox" checked>
    <label for="enabled" style="margin:0">Enabled</label>
  </div>

  <button id="save">Save & reconnect</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
