name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 0: Conventional commit lint ──────────────────────────
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate conventional commit format
        run: |
          PATTERN='^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\(.+\))?(!)?\: .+'

          # Get all commits in this PR that are not on the base branch
          COMMITS=$(git log --oneline origin/${{ github.base_ref }}..HEAD --format="%s")

          FAILED=0
          while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: \"$MSG\""
              FAILED=1
            fi
          done <<< "$COMMITS"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must follow the Conventional Commits format:"
            echo "  <type>(<optional scope>): <description>"
            echo ""
            echo "Allowed types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert"
            echo ""
            echo "Examples:"
            echo "  feat: add tiered feature gate system"
            echo "  fix(crypto): handle empty key gracefully"
            echo "  chore!: drop Node 18 support"
            exit 1
          fi

          echo "All commit messages follow conventional commit format."

  # ─── Job A: Frontend lint, typecheck, and tests ─────────────
  frontend-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + lint
        run: npm run check

      - name: Build
        run: npm run build

      - name: Check bundle size budget
        # Budget: 850 KB per chunk (main index is ~778 KB: systemStore + agentStore + Sidebar).
        # Further reduction requires splitting these stores into granular packages.
        # Total: 5000 KB across all chunks.
        run: node scripts/check-bundle-budget.mjs --max-chunk-kb=850 --max-total-kb=5000

      - name: Save bundle baseline
        run: node scripts/bundle-size-report.mjs --save-baseline

      - name: Comment bundle size on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/bundle-comment.mjs

      - name: Check for unused bindings
        run: bash scripts/check-unused-bindings.sh

      - name: Run frontend tests
        run: npm run test -- --run

  # ─── Job B: Rust tests on all 3 platforms ───────────────────
  rust-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-22.04
            label: linux
    runs-on: ${{ matrix.os }}
    env:
      # sccache: shared compilation cache backed by GitHub Actions cache.
      # Skips recompiling unchanged crates — typical speedup: 50-70%.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.label }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  # ─── Job C: Check generated command names are fresh ─────────
  command-name-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate command names
        run: node scripts/generate-command-names.mjs

      - name: Check for command name drift
        run: |
          if ! git diff --quiet src/lib/commandNames.generated.ts src/lib/commandNames.overrides.ts; then
            echo "::error::Generated command names are out of date. Run 'node scripts/generate-command-names.mjs' locally and commit the changes."
            git diff src/lib/commandNames.generated.ts src/lib/commandNames.overrides.ts
            exit 1
          fi
          echo "Command names are up to date."

  # ─── Job D: Check TypeScript bindings are up to date ────────
  binding-drift:
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: binding-drift

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Regenerate TypeScript bindings
        run: cargo test --manifest-path src-tauri/Cargo.toml export_bindings 2>/dev/null || true

      - name: Check for binding drift
        run: |
          if ! git diff --quiet src/lib/bindings/; then
            echo "::error::TypeScript bindings are out of date. Run 'cargo test export_bindings' locally and commit the changes."
            git diff src/lib/bindings/
            exit 1
          fi
          echo "Bindings are up to date."
