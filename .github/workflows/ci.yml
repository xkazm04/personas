name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 0: Conventional commit lint ──────────────────────────
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate conventional commit format
        run: |
          PATTERN='^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\(.+\))?(!)?\: .+'

          # Get all commits in this PR that are not on the base branch
          COMMITS=$(git log --oneline origin/${{ github.base_ref }}..HEAD --format="%s")

          FAILED=0
          while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: \"$MSG\""
              FAILED=1
            fi
          done <<< "$COMMITS"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must follow the Conventional Commits format:"
            echo "  <type>(<optional scope>): <description>"
            echo ""
            echo "Allowed types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert"
            echo ""
            echo "Examples:"
            echo "  feat: add tiered feature gate system"
            echo "  fix(crypto): handle empty key gracefully"
            echo "  chore!: drop Node 18 support"
            exit 1
          fi

          echo "All commit messages follow conventional commit format."

  # ─── Job A: Frontend lint, typecheck, and tests ─────────────
  frontend-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + lint
        run: npm run check

      - name: Check i18n locale keyset parity
        # CLAUDE.md long claimed this was a CI gate — it wasn't until
        # build-tooling architect run 2026-05-01 wired it. Catches locale
        # files that drift from en.json's keyset (missing or extra keys),
        # which crashes the UI at runtime via the deep-merge fallback.
        run: npm run check:i18n

      - name: Check ERROR_KEY_MAP ↔ en.json error_registry parity
        # Asserts every keyPrefix in src/i18n/useTranslatedError.ts has both
        # <prefix>_message and <prefix>_suggestion under error_registry in
        # en.json. Without these, runtime falls back to the raw error string
        # and the user sees a degraded message. Wired by the error-handling
        # architect run 2026-05-10.
        run: npm run check:error-registry

      - name: Check theme contrast (WCAG AA token pairings)
        # Audits src/styles/globals.css for every theme: body, muted-foreground,
        # muted-foreground at the minimum caption opacity (80%), and muted text
        # must each clear AA (4.5:1) against the canvas. Fails the build on any
        # sub-AA text-token pairing so secondary/helper-text legibility can't
        # regress per-component. See docs/development/contrast.md.
        run: npm run check:themes

      - name: Validate Tauri config overlays
        # Catches: drift in $schema across the three configs, overlays
        # touching unexpected keys (so the overlay surface stays small),
        # and feature names that don't match Cargo.toml [features].
        run: npm run check:tauri-configs

      - name: Validate tier builds (starter / team)
        # Tier variants flip frontend gating via VITE_APP_TIER and tree-shake
        # disabled features. Validate starter + team compile here so a broken
        # tier-gate import doesn't slip through. The builder tier is NOT built
        # here — the canonical `npm run build` step below produces it, so
        # building it again would be redundant (~one extra full Vite build per
        # CI run). check:tiers writes to dist/ as a side effect, so it must run
        # BEFORE the canonical build, which leaves dist/ as the builder bundle
        # for the bundle-budget / baseline steps that read it.
        run: npm run check:tiers starter team

      - name: Build
        run: npm run build

      - name: Check bundle size budget
        # Budget lives in scripts/lib/bundle-budget.mjs (single source shared
        # with bundle-size-report.mjs): 850 KB/chunk, 5000 KB total. No flags
        # needed — the script defaults to the shared budget.
        run: node scripts/check-bundle-budget.mjs

      - name: Comment bundle size on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/bundle-comment.mjs

      - name: Check for unused bindings
        run: bash scripts/check-unused-bindings.sh

      - name: Run frontend tests
        run: npm run test -- --run

  # ─── Job B: Rust tests on all 3 platforms ───────────────────
  rust-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-22.04
            label: linux
    runs-on: ${{ matrix.os }}
    env:
      # sccache: shared compilation cache backed by GitHub Actions cache.
      # Skips recompiling unchanged crates — typical speedup: 50-70%.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.label }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libpipewire-0.3-dev

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check dependency policies
        run: cd src-tauri && cargo deny check

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  # ─── Job C: Check generated command names are fresh ─────────
  command-name-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Regenerate command names
        run: node scripts/generate-command-names.mjs

      - name: Check for command name drift
        run: |
          if ! git diff --quiet src/lib/commandNames.generated.ts src/lib/commandNames.overrides.ts; then
            echo "::error::Generated command names are out of date. Run 'node scripts/generate-command-names.mjs' locally and commit the changes."
            git diff src/lib/commandNames.generated.ts src/lib/commandNames.overrides.ts
            exit 1
          fi
          echo "Command names are up to date."

  # ─── Job D: Check TypeScript bindings are up to date ────────
  binding-drift:
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: binding-drift

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libpipewire-0.3-dev

      - name: Regenerate TypeScript bindings
        # ts-rs writes to src/lib/bindings/ via TS_RS_EXPORT_DIR set in
        # src-tauri/.cargo/config.toml. The drift check below diffs that path.
        # Fail loudly: if Rust compile errors prevent export, the binding-drift
        # gate is meaningless. (Previously wrapped in `2>/dev/null || true`,
        # which silently masked Rust-side breakage.)
        run: cargo test --manifest-path src-tauri/Cargo.toml export_bindings

      - name: Check for binding drift
        run: |
          if ! git diff --quiet src/lib/bindings/; then
            echo "::error::TypeScript bindings are out of date. Run 'cargo test export_bindings' locally and commit the changes."
            git diff src/lib/bindings/
            exit 1
          fi
          echo "Bindings are up to date."
