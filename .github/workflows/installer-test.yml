name: Installer Test

on:
  # Run after a release completes
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  # Allow manual trigger for ad-hoc testing
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (e.g. v0.1.0). Leave empty to build from HEAD."
        required: false

concurrency:
  group: installer-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Option A: Test from release artifacts ───────────────────
  test-release:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download latest NSIS installer from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = gh release view --json tagName --jq '.tagName'
          Write-Host "Testing release: $tag"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          gh release download $tag --pattern "*x64-setup.exe" --dir artifacts
          $installer = Get-ChildItem artifacts\*x64-setup.exe | Select-Object -First 1
          Write-Host "Downloaded: $($installer.FullName)"
          echo "INSTALLER=$($installer.FullName)" >> $env:GITHUB_ENV

      - name: Run installer acceptance test
        run: powershell -ExecutionPolicy Bypass -File scripts\test-installer.ps1 -Installer $env:INSTALLER

  # ─── Option B: Build + test from HEAD ────────────────────────
  test-build:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.tag == ''
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS installer
        run: npx tauri build --bundles nsis

      - name: Find installer
        run: |
          $installer = Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*x64-setup.exe |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          echo "INSTALLER=$($installer.FullName)" >> $env:GITHUB_ENV

      - name: Run installer acceptance test
        run: powershell -ExecutionPolicy Bypass -File scripts\test-installer.ps1 -Installer $env:INSTALLER

  # ─── Option C: Test a specific tag ───────────────────────────
  test-tag:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.tag != ''
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download installer for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          Write-Host "Testing release: $tag"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          gh release download $tag --pattern "*x64-setup.exe" --dir artifacts
          $installer = Get-ChildItem artifacts\*x64-setup.exe | Select-Object -First 1
          echo "INSTALLER=$($installer.FullName)" >> $env:GITHUB_ENV

      - name: Run installer acceptance test
        run: powershell -ExecutionPolicy Bypass -File scripts\test-installer.ps1 -Installer $env:INSTALLER
