<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0" />
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Subtle background grid -->
  <path d="M0 100H1200M0 200H1200M0 300H1200M100 0V400M200 0V400M300 0V400M400 0V400M500 0V400M600 0V400M700 0V400M800 0V400M900 0V400M1000 0V400M1100 0V400" stroke="white" stroke-opacity="0.02" />

  <!-- Animated data paths -->
  <g filter="url(#glow)">
    <path d="M-50 200C100 200 200 100 400 100S700 300 900 300S1250 200 1250 200" stroke="url(#line-grad)" stroke-width="1.5" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="10s" repeatCount="indefinite" />
    </path>
    <path d="M-50 150C150 150 250 250 450 250S750 100 950 100S1250 150 1250 150" stroke="url(#line-grad)" stroke-width="1" stroke-dasharray="5 5" opacity="0.3">
      <animate attributeName="stroke-dashoffset" from="-100" to="0" dur="15s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Central Nodes -->
  <circle cx="600" cy="200" r="40" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4" />
  <circle cx="600" cy="200" r="60" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- Floating nodes across width -->
  <circle cx="300" cy="150" r="3" fill="#22d3ee" fill-opacity="0.4" />
  <circle cx="900" cy="250" r="3" fill="#a78bfa" fill-opacity="0.4" />
  <circle cx="450" cy="280" r="2" fill="#22d3ee" fill-opacity="0.2" />
  <circle cx="750" cy="120" r="2" fill="#a78bfa" fill-opacity="0.2" />
</svg>
